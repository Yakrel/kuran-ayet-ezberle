name: Android CI Build

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']
  workflow_dispatch: {}

jobs:
  android-build:
    name: Android ${{ matrix.variant }} build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: development
            gradle_tasks: assembleDebug
          - variant: production
            gradle_tasks: assembleRelease bundleRelease
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max_old_space_size=4096
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_SIGNING_READY: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Ensure Android SDK packages
        run: |
          {
            echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
            echo "$ANDROID_SDK_ROOT/platform-tools"
          } >> "$GITHUB_PATH"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Run Expo prebuild
        run: npx expo prebuild --platform android --no-install --non-interactive

      - name: Prepare Android release signing
        if: matrix.variant == 'production' && env.RELEASE_SIGNING_READY == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          {
            echo "ANDROID_SIGNING_STORE_FILE=$RUNNER_TEMP/release.keystore"
            echo "ANDROID_SIGNING_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "ANDROID_SIGNING_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "ANDROID_SIGNING_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"

      - name: Report signing mode
        if: matrix.variant == 'production'
        run: |
          if [ "$RELEASE_SIGNING_READY" = "true" ]; then
            echo "Production build will be signed."
          else
            echo "Production build will be unsigned."
          fi

      - name: Build Android artifacts
        working-directory: android
        run: ./gradlew ${{ matrix.gradle_tasks }} --stacktrace

      - name: Upload development APK
        if: matrix.variant == 'development'
        uses: actions/upload-artifact@v4
        with:
          name: development-kuran-ayet-ezberle
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload signed production artifacts
        if: matrix.variant == 'production' && env.RELEASE_SIGNING_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: production-kuran-ayet-ezberle-signed
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload unsigned production artifacts
        if: matrix.variant == 'production' && env.RELEASE_SIGNING_READY != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: production-kuran-ayet-ezberle-unsigned
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
