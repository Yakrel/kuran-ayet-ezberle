name: Mobile CI Builds

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

jobs:
  android-build:
    name: Android debug build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.20.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Ensure Android SDK packages
        run: |
          {
            echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
            echo "$ANDROID_SDK_ROOT/platform-tools"
          } >> "$GITHUB_PATH"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Run Expo prebuild
        run: CI=1 npx expo prebuild --platform android --no-install

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace --warning-mode all

      - name: Upload Android APK
        uses: actions/upload-artifact@v6
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  ios-build:
    name: iOS simulator build
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.20.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run Expo prebuild
        run: CI=1 npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS app for simulator
        run: |
          xcodebuild \
            -workspace ios/KuranAyetEzberle.xcworkspace \
            -scheme KuranAyetEzberle \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS app bundle
        uses: actions/upload-artifact@v6
        with:
          name: ios-simulator-app
          path: ios/build/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: error
