name: Mobile CI Builds

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

jobs:
  android-development-build:
    name: Android development APK build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.20.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Ensure Android SDK packages
        run: |
          {
            echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
            echo "$ANDROID_SDK_ROOT/platform-tools"
          } >> "$GITHUB_PATH"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Run Expo prebuild
        run: CI=1 npx expo prebuild --platform android --no-install

      - name: Build Android development APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace --warning-mode all

      - name: Upload Android development APK
        uses: actions/upload-artifact@v6
        with:
          name: android-development-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  android-production-build:
    name: Android production APK build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max_old_space_size=4096
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.20.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate Android release signing secrets
        run: |
          test -n "$ANDROID_SIGNING_STORE_PASSWORD" || { echo "Missing secret: ANDROID_SIGNING_STORE_PASSWORD" >&2; exit 1; }
          test -n "$ANDROID_SIGNING_KEY_ALIAS" || { echo "Missing secret: ANDROID_SIGNING_KEY_ALIAS" >&2; exit 1; }
          test -n "$ANDROID_SIGNING_KEY_PASSWORD" || { echo "Missing secret: ANDROID_SIGNING_KEY_PASSWORD" >&2; exit 1; }
          test -n "${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}" || { echo "Missing secret: ANDROID_SIGNING_KEYSTORE_BASE64" >&2; exit 1; }

      - name: Restore Android release keystore
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          test -s "$RUNNER_TEMP/release.keystore" || { echo "Decoded keystore file is empty" >&2; exit 1; }

      - name: Run Expo prebuild
        run: CI=1 npx expo prebuild --platform android --no-install

      - name: Build Android production APK
        working-directory: android
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore
        run: ./gradlew :app:assembleRelease --stacktrace --warning-mode all

      - name: Upload Android production APK
        uses: actions/upload-artifact@v6
        with:
          name: android-production-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

